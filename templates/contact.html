<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Contact - ExcuseAI</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

    <link
        rel="icon"
        type="image/png"
        href="{{ url_for('static', filename='images/favicon.png') }}"
    >
</head>

<body>

    <!-- Header -->
    <header class="site-header">

        <a href="{{ url_for('home') }}" class="logo">
            <img
                src="{{ url_for('static', filename='images/logo.png') }}"
                alt="ExcuseAI Logo"
            >
        </a>

        <nav>
            <a href="{{ url_for('home') }}">Home</a>
            <a href="{{ url_for('home') }}#generator">Generator</a>
            <a href="{{ url_for('about') }}">About</a>
            <a href="{{ url_for('contact') }}">Contact</a>
            <a href="{{ url_for('faq') }}">FAQ</a>
        </nav>

    </header>


    <!-- Contact Section -->
    <main class="contact-main">

        <section class="contact-container">

            <div class="contact-heading">
                <h1>Contact Us</h1>

                <p>
                    Have a question, suggestion, or feedback?
                    Send us a message and we will get back to you.
                </p>
            </div>


            {% if success %}
                <div class="form-message success-message">
                    {{ success }}
                </div>
            {% endif %}


            <form
                class="contact-form"
                action="https://api.web3forms.com/submit"
                method="POST"
            >

                <input
                    type="hidden"
                    name="access_key"
                    value="{{ web3forms_key }}"
                >

                <input
                    type="hidden"
                    name="subject"
                    value="New Contact Message - ExcuseAI"
                >

                <input
                    type="hidden"
                    name="from_name"
                    value="ExcuseAI Contact Form"
                >

                <input
                    type="hidden"
                    name="redirect"
                    value="https://ai-excuse-generator-yott.onrender.com/contact?success=1"
                >

                <input
                    type="checkbox"
                    name="botcheck"
                    style="display: none;"
                >


                <div class="contact-field">
                    <label for="name">Your Name</label>

                    <input
                        type="text"
                        id="name"
                        name="name"
                        placeholder="Enter your name"
                        required
                    >
                </div>


                <div class="contact-field">
                    <label for="email">Email Address</label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="Enter your email"
                        required
                    >
                </div>


                <div class="contact-field">
                    <label for="message">Your Message</label>

                    <textarea
                        id="message"
                        name="message"
                        rows="6"
                        placeholder="Write your message here..."
                        required
                    ></textarea>
                </div>


                <button type="submit" class="contact-btn">
                    Send Message
                </button>

            </form>

        </section>

    </main>


    <!-- Footer -->
    <footer class="site-footer">
        <p>
            © 2026 ExcuseAI. All rights reserved.
        </p>
    </footer>

</body>

</html>
